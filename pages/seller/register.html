<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Seller Registration - AutoVerve </title>
        <link rel="stylesheet" href="../../css/base.css">
        <link rel="stylesheet" href="../../css/layout.css">
        <link rel="stylesheet" href="../../css/components.css">
    </head>
    <body>
        <nav class="navbar">
            <div class="container flex-between">
                <a href="../../index.html">
                    <img src="../../images/logo.png" alt="AutoVerve Logo" class="logo-img">
                </a>
                <ul class="nav-menu">
                    <li><a href="../../index.html">Home</a></li>
                    <li><a href="../car/search.html">Search Cars</a></li>
                    <li><a href="./register.html" style="color:#fff; border-bottom:2px solid #fff;">Seller Register</a></li>
                    <li><a href="./login.html">Seller Login</a></li>
                    <li><a href="../car/add-car.html">Add Car</a></li>
                    <li><a href="../car/detail.html">Car Details</a></li>
                </ul>
            </div>
        </nav>

        <section class="light-section">
            <div class="container" style="max-width: 600px; margin-top: 80px;">
                <h2> Welcome to AutoVerve Seller Registration </h2>
                <p> Please fill out the form below to register as a seller. </p>

                <form id="RegistrationForm" style="margin-top: 32px;">
                    <div class="form-group" style="margin-bottom: calc(var(--space) * 3);">
                        <label for="name" style="display: block; margin-bottom: var(--space); font-weight: 500;"> Name: </label>
                        <input
                            type="text"
                            id="name"
                            name="name"
                            required
                            pattern="[a-zA-Z\s]+"
                            title="Only alphabetical letters and space allowed"
                            style="width: 100%; padding: calc(var(--space) * 1.5); border-radius: var(--radius); border: 1px solid #ddd; font-family: var(--font-body); font-size: 1rem;">
                    </div>

                    <div class="form-group" style="margin-bottom: calc(var(--space) * 3);">
                        <label for="address" style="display: block; margin-bottom: var(--space); font-weight: 500;"> Address: </label>
                        <input
                            type="text"
                            id="address"
                            name="address"
                            required
                            pattern="[a-zA-Z0-9\s]+"
                            title="Only alphabetical letters and space allowed"
                            style="width: 100%; padding: calc(var(--space) * 1.5); border-radius: var(--radius); border: 1px solid #ddd; font-family: var(--font-body); font-size: 1rem;">
                    </div>

                    <div class="form-group" style="margin-bottom: calc(var(--space) * 3);">
                        <label for="phone" style="display: block; margin-bottom: var(--space); font-weight: 500;"> Phone number: </label>
                        <input
                            type="tel"
                            id="phone"
                            name="phone"
                            required
                            pattern="^1[3-9][0-9]{9}$"
                            title="Please enter a valid 11-digit China phone number"
                            style="width: 100%; padding: calc(var(--space) * 1.5); border-radius: var(--radius); border: 1px solid #ddd; font-family: var(--font-body); font-size: 1rem;">
                    </div>

                    <div class="form-group" style="margin-bottom: calc(var(--space) * 3);">
                        <label for="email" style="display: block; margin-bottom: var(--space); font-weight: 500;"> Email address: </label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            required
                            pattern="^[a-zA-Z0-9]+@[a-zA-Z]+\.(com|cn)$"
                            title="Must contain exactly one '@' and end with .cn or .com"
                            style="width: 100%; padding: calc(var(--space) * 1.5); border-radius: var(--radius); border: 1px solid #ddd; font-family: var(--font-body); font-size: 1rem;">
                    </div>

                    <div class="form-group" style="margin-bottom: calc(var(--space) * 3);">
                        <label for="username" style="display: block; margin-bottom: var(--space); font-weight: 500;"> Username: </label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            required
                            minlength="6"
                            pattern="[a-zA-Z0-9\s]+"
                            title="Must consist of at least 6 alphanumeric characters"
                            style="width: 100%; padding: calc(var(--space) * 1.5); border-radius: var(--radius); border: 1px solid #ddd; font-family: var(--font-body); font-size: 1rem;">
                    </div>

                    <div class="form-group" style="margin-bottom: calc(var(--space) * 3);">
                        <label for="password" style="display: block; margin-bottom: var(--space); font-weight: 500;"> Password: </label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            required
                            minlength="6"
                            pattern="[a-zA-Z0-9\s]+"
                            title="Must consist of at least 6 alphanumeric characters"
                            style="width: 100%; padding: calc(var(--space) * 1.5); border-radius: var(--radius); border: 1px solid #ddd; font-family: var(--font-body); font-size: 1rem;">
                    </div>

                    <button 
                        type="submit"
                        style=
                            "padding: calc(var(--space) * 1.5) calc(var(--space) * 4); 
                            background: var(--primary); 
                            color: var(--accent); 
                            border: none; 
                            border-radius: var(--radius); 
                            font-family: var(--font-body); 
                            font-size: 1rem; 
                            font-weight: 500;
                            cursor: pointer;
                            transition: var(--trans);"
                        onmouseover="this.style.opacity=0.9"
                        onmouseout="this.style.opacity=1">
                        Register
                    </button>
                </form>
            </div>
        </section>

        <footer class="footer">
            <div class="container flex-between">
                <p>&copy; 2026 AutoMarket. All rights reserved.</p>
                <nav class="footer-links">
                    <a href="pages/car/search.html">Search</a>
                    <a href="pages/car/add-car.html">Add-Car</a>
                    <a href="pages/seller/login.html">Login</a>
                </nav>
            </div>
        </footer>

    </body>
</html>
