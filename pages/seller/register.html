<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title> Seller Registration - AutoVerve </title>
    </head>
    <body>
        <h2> Welcome to AutoVerve Seller Registration </h2>
        <p> Please fill out the form below to register as a seller. </p>

        <form id="RegisteationForm">
            <div class="form-group">
                <label for="name"> Name: </label>
                <input
                    type="text"
                    id="name"
                    required
                    pattern="[a-zA-Z\s]+"
                    title="Only alphabetical letters and space allowed">
            </div>

            <div class="form-group">
                <label for="address"> Address: </label>
                <input
                    type="text"
                    id="address"
                    required
                    pattern="[a-zA-Z0-9\s]+"
                    title="Only alphanumeric characters and space allowed">
            </div>

            <div class="form-group">
                <label for="phone"> Phone number: </label>
                <input
                    type="tel"
                    id="phone"
                    required
                    pattern="^1[3-9][0-9]{9}$"
                    title="Please enter a valid 11-digit China phone number">
            </div>
            
            <div class="form-group">
                <label for="email"> Email address: </label>
                <input
                    type="text"
                    id="email"
                    required
                    title="Must contain exactly one '@' and end with .cn or .com">
            </div>

            <div class="form-group">
                <label for="username"> Username: </label>
                <input
                    type="text"
                    id="username"
                    required
                    minlength="6"
                    pattern="[a-zA-Z0-9\s]+"
                    title="Must consist of at least 6 alphanumeric characters">
            </div>

            <div class="form-group">
                <label for="Password"> Password: </label>
                <input
                    type="password"
                    id="password"
                    required
                    minlength="6"
                    pattern="[a-zA-Z0-9\s]+"
                    title="Must consist of at least 6 alphanumeric characters">
            </div>
            <button type="submit"> Register </button>
        </form>
    </body>
</html>
