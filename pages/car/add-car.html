<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Car - AutoMarket</title>

    <link rel="stylesheet" href="../../css/style.css">

    <style>
        main {
            padding-top: 100px;
        }

        .card {
            max-width: 700px;
            margin: 0 auto 2rem auto;
            background: white;
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid #eee;
        }

        .card h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .sub {
            color: #666;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }

        .submit {
            width: 100%;
            padding: 0.85rem;
            background: #111;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .submit:hover {
            background: #333;
        }

        table {
            width: 100%;
            background: white;
            margin-bottom: 20px;
        }

        td {
            padding: 12px 8px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        @media (max-width: 640px) {
            .card {
                margin: 1rem;
                padding: 1.5rem;
            }
            main {
                padding-top: 140px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

            <img src="../../images/logo.png" alt="AutoMarket Logo">
        </a>

            <li><a href="../seller/login.html">Seller Login</a></li>
            <li><a href="add-car.html" style="color:#fff; border-bottom:2px solid #fff;">Add Car</a></li>
            <li><a href="detail.html">Car Details</a></li>
        </ul>
    </div>
</nav>
