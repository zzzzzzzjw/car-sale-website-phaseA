<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Cars - AutoMarket</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        main {
            padding-top: 100px;
        }
        .search-card {
            max-width: 800px;
            margin: 0 auto 2rem auto;
            background: white;
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid #eee;
        }
        .search-card h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .search-sub {
            color: #666;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }
        .btn-search {
            width: 100%;
            padding: 0.85rem;
            background: #111;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .btn-search:hover {
            background: #333;
        }
        .results-card {
            max-width: 800px;
            margin: 0 auto 2rem auto;
            background: white;
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid #eee;
        }
        .results-card h2 {
            font-size: 1.4rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #eee;
        }
        table {
            width: 100%;
            background: white;
            margin-bottom: 20px;
        }
        td {
            padding: 12px 8px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .result-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        .result-item a {
            text-decoration: none;
            color: #1a3a5c;
            font-weight: bold;
        }
        .result-item a:hover {
            text-decoration: underline;
        }
        .result-price {
            color: #e63946;
            font-weight: bold;
        }
        @media (max-width: 640px) {
            .search-card, .results-card {
                margin: 1rem;
                padding: 1.5rem;
            }
            main {
                padding-top: 140px;
            }
        }
    </style>
