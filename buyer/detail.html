<!DOCTYPE html>
<html>
<head>
    <title>Car Details - AutoMarket</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .detail-container {
            margin-top: 60px;
            padding: 20px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            background-color: rgba(255, 255, 255, 0.9);
    
        }
        .detail-image {
            width: 100%;
            max-width: 400px;
            
            margin-bottom: 20px;
        }
        .detail-info {
            line-height: 1.8;
        }
        .detail-info p {
            margin: 10px 0;
            font-size: 16px;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: white;
            background-color: black;
            padding: 10px 20px;
            text-decoration: none;
            
        }
        .back-link:hover {
            background-color: #333;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="container clearfix">
        <div class="logo">
            <a href="../homepage/index.html">
                <img src="../images/logo.png" alt="AutoMarket Logo">
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="../homepage/index.html">Home</a></li>
            <li><a href="search.html">Search Cars</a></li>
            <li><a href="../seller/register.html">Register</a></li>
            <li><a href="../seller/login.html">Login</a></li>
            <li><a href="../seller/add-car.html">Add Car</a></li>
        </ul>
    </div>
</div>

<div style="clear: both;"></div>

<div class="detail-container">
    <h1 style="text-align: center;">Car Details</h1>
    
    <div style="text-align: center;">
        <img src="../images/TESLA_S.png" alt="Tesla Model S" class="detail-image">
    </div>
    
    <div class="detail-info">
        <p><strong>Model:</strong> Tesla Model S</p>
        <p><strong>Colour:</strong> Red</p>
        <p><strong>Year:</strong> 2023</p>
        <p><strong>Location:</strong> Beijing, China</p>
        <p><strong>Price:</strong> ¥350,000</p>
        <p><strong>Description:</strong> Excellent condition, low mileage, fully serviced.</p>
    </div>
    
    <div style="text-align: center;">
        <a href="search.html" class="back-link">← Back to Search</a>
    </div>
</div>

</body>
</html>
