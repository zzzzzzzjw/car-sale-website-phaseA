<!DOCTYPE html>
<html>
<head>
    <title>Car Details - AutoMarket</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/buyer_style.css">
</head>
<body class="buyer-page">

<div class="navbar">
    <div class="container clearfix">
        <div class="logo">
            <a href="../homepage/index.html">
                <img src="../images/logo.png" alt="AutoMarket Logo">
            </a>
        </div>
        <ul class="nav-links">
            <li><a href="../homepage/index.html">Home</a></li>
            <li><a href="search.html">Search Cars</a></li>
            <li><a href="../seller/register.html">Register</a></li>
            <li><a href="../seller/login.html">Login</a></li>
            <li><a href="../seller/add-car.html">Add Car</a></li>
        </ul>
    </div>
</div>

<div style="clear: both;"></div>

<div class="detail-container">
    <h1 style="text-align: center;">Car Details</h1>
    
    <div style="text-align: center;">
        <img src="../images/TESLA_S.png" alt="Tesla Model S" class="detail-image">
    </div>
    
    <div class="detail-info">
        <p><strong>Model:</strong> <span id="modelValue">Tesla Model S</span></p>
        <p><strong>Colour:</strong> <span id="colourValue">Red</span></p>
        <p><strong>Year:</strong> <span id="yearValue">2023</span></p>
        <p><strong>Location:</strong> <span id="locationValue">Beijing, China</span></p>
        <p><strong>Price:</strong> <span id="priceValue">¥350,000</span></p>
        <p><strong>Description:</strong> Excellent condition, low mileage, fully serviced.</p>
    </div>
    
    <div style="text-align: center;">
        <a href="search.html" class="back-link">← Back to Search</a>
    </div>
</div>

<script>
    function getQueryParam(param) {
        var urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    var model = getQueryParam('model');
    var year = getQueryParam('year');
    var colour = getQueryParam('colour');
    var price = getQueryParam('price');

    if (model) {
        document.getElementById('modelValue').innerHTML = model;
    }
    if (year) {
        document.getElementById('yearValue').innerHTML = year;
    }
    if (colour) {
        document.getElementById('colourValue').innerHTML = colour;
    }
    if (price) {
        document.getElementById('priceValue').innerHTML = '¥' + price;
    }
</script>

</body>
</html>
